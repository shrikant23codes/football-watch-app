<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:             #f7f7f5;
      --surface:        #ffffff;
      --border:         #e4e4e2;
      --border-strong:  #d0d0ce;
      --text:           #0f0f0e;
      --text-2:         #6b6b69;
      --text-3:         #a8a8a6;
      --hover:          #f0f0ee;
      --active-bg:      #eaeae8;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .header-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-divider {
      width: 1px;
      height: 12px;
      background: var(--border-strong);
    }

    .header-sub {
      font-size: 12px;
      color: var(--text-3);
      letter-spacing: -0.01em;
    }

    /* ── Main split ───────────────────────────── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Video panel (left) ───────────────────── */
    .video-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111110;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }

    /* ── Custom controls ──────────────────────────── */
    .video-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
      flex-direction: column;
      gap: 0;
      padding: 28px 14px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
    }

    .video-wrap:hover .video-controls,
    .video-wrap.is-playing .video-controls {
      display: flex;
    }

    .controls-progress {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .controls-progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      margin-top: -4.5px;
    }

    .controls-progress::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 2px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.9);
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .ctrl-btn:hover {
      color: #fff;
    }

    .ctrl-time {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      flex: 1;
    }

    .video-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      pointer-events: none;
    }

    .video-empty-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #2a2a28;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-empty-icon svg {
      color: #3a3a38;
    }

    .video-empty p {
      font-size: 12px;
      color: #3a3a38;
      letter-spacing: -0.01em;
    }

    /* ── Video footer ─────────────────────────── */
    .video-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .video-current-title {
      font-size: 13px;
      font-weight: 450;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .video-current-title.empty {
      color: var(--text-3);
      font-weight: 400;
    }

    .shortcuts {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: inherit;
      color: var(--text-2);
      min-width: 28px;
    }

    .shortcuts-label {
      font-size: 11px;
      color: var(--text-3);
      margin-left: 2px;
    }

    /* ── List panel (right) ───────────────────── */
    .list-panel {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .list-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .list-header-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 5px;
      padding: 5px 11px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition: opacity 0.1s;
    }

    .btn-add:hover {
      opacity: 0.8;
    }

    /* ── Match list ───────────────────────────── */
    .match-list {
      flex: 1;
      overflow-y: auto;
    }

    .match-list::-webkit-scrollbar {
      width: 3px;
    }
    .match-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .match-list::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 2px;
    }

    /* ── Match item ───────────────────────────── */
    .match-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.08s;
      position: relative;
    }

    .match-item:hover {
      background: var(--hover);
    }

    .match-item.is-active {
      background: var(--active-bg);
    }

    .match-item-index {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0.04em;
      padding-top: 1px;
      width: 20px;
    }

    .match-item-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .match-item-desc {
      font-size: 13px;
      color: var(--text);
      font-weight: 450;
      letter-spacing: -0.02em;
      background: none;
      border: none;
      outline: none;
      font-family: inherit;
      width: 100%;
      cursor: pointer;
      padding: 0;
    }

    .match-item-desc:focus {
      cursor: text;
    }

    .match-item-desc::placeholder {
      color: var(--text-3);
      font-weight: 400;
    }

    .match-item-url {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .match-item-delete {
      flex-shrink: 0;
      opacity: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      padding: 2px;
      line-height: 1;
      transition: opacity 0.1s, color 0.1s;
      border-radius: 3px;
    }

    .match-item:hover .match-item-delete {
      opacity: 1;
    }

    .match-item-delete:hover {
      color: var(--text);
    }

    /* ── Empty state ──────────────────────────── */
    .empty-state {
      padding: 48px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .empty-state p {
      font-size: 12px;
      color: var(--text-3);
      letter-spacing: -0.01em;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header>
    <span class="header-title">Football Watch</span>
    <div class="header-divider"></div>
    <span class="header-sub">match archive</span>
  </header>

  <main>

    <!-- Video panel -->
    <section class="video-panel">
      <div class="video-wrap" id="video-wrap">
        <div class="video-empty" id="video-empty">
          <div class="video-empty-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2">
              <polygon points="6,4 12,8 6,12" />
            </svg>
          </div>
          <p>Select a match to watch</p>
        </div>
        <video id="video-player" style="display:none;"></video>

        <div class="video-controls" id="video-controls">
          <input class="controls-progress" id="ctrl-progress" type="range" min="0" max="100" step="0.05" value="0" />
          <div class="controls-row">
            <button class="ctrl-btn" id="ctrl-play" title="Play / Pause">
              <svg id="icon-play" width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                <polygon points="5,3 15,9 5,15" />
              </svg>
              <svg id="icon-pause" width="18" height="18" viewBox="0 0 18 18" fill="currentColor" style="display:none;">
                <rect x="4" y="3" width="3.5" height="12" rx="1"/><rect x="10.5" y="3" width="3.5" height="12" rx="1"/>
              </svg>
            </button>
            <span class="ctrl-time" id="ctrl-time">0:00 / 0:00</span>
            <button class="ctrl-btn" id="ctrl-fullscreen" title="Fullscreen">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4">
                <polyline points="1,5 1,1 5,1"/><polyline points="10,1 14,1 14,5"/>
                <polyline points="14,10 14,14 10,14"/><polyline points="5,14 1,14 1,10"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="video-footer">
        <span class="video-current-title empty" id="current-title">No match selected</span>
        <div class="shortcuts">
          <kbd class="kbd">space</kbd>
          <kbd class="kbd">←</kbd>
          <kbd class="kbd">→</kbd>
          <span class="shortcuts-label">5s seek</span>
          <kbd class="kbd" style="margin-left:4px;">f</kbd>
          <span class="shortcuts-label">fullscreen</span>
        </div>
      </div>
    </section>

    <!-- Match list panel -->
    <aside class="list-panel">
      <div class="list-header">
        <span class="list-header-label">Matches</span>
        <button class="btn-add" id="btn-add">+ Add match</button>
      </div>

      <div class="match-list" id="match-list">

        <!-- Sample items with real test URL on item 1 — will be replaced by JS in step 3 -->
        <div class="match-item"
             data-url="https://videos.footballia.net/uploads/video/source_file/36584/2015-16_At._Madrid_-_R._Madrid.mp4"
             data-title="Atlético Madrid vs Real Madrid">
          <span class="match-item-index">01</span>
          <div class="match-item-body">
            <input class="match-item-desc" type="text" value="Atlético Madrid vs Real Madrid" placeholder="Match description" />
            <span class="match-item-url">footballia.eu · La Liga 2015–16</span>
          </div>
          <button class="match-item-delete" title="Remove">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
              <line x1="2" y1="2" x2="11" y2="11" /><line x1="11" y1="2" x2="2" y2="11" />
            </svg>
          </button>
        </div>

        <div class="match-item" data-url="" data-title="Barcelona vs Bayern Munich">
          <span class="match-item-index">02</span>
          <div class="match-item-body">
            <input class="match-item-desc" type="text" value="Barcelona vs Bayern Munich" placeholder="Match description" />
            <span class="match-item-url">footballia.eu · UCL Semi-final 2015</span>
          </div>
          <button class="match-item-delete" title="Remove">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
              <line x1="2" y1="2" x2="11" y2="11" /><line x1="11" y1="2" x2="2" y2="11" />
            </svg>
          </button>
        </div>

        <div class="match-item" data-url="" data-title="">
          <span class="match-item-index">03</span>
          <div class="match-item-body">
            <input class="match-item-desc" type="text" value="" placeholder="Add a description…" />
            <span class="match-item-url">footballia.eu · example entry</span>
          </div>
          <button class="match-item-delete" title="Remove">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
              <line x1="2" y1="2" x2="11" y2="11" /><line x1="11" y1="2" x2="2" y2="11" />
            </svg>
          </button>
        </div>

      </div>
    </aside>

  </main>

  <script>
    const video        = document.getElementById('video-player');
    const videoEmpty   = document.getElementById('video-empty');
    const videoWrap    = document.getElementById('video-wrap');
    const currentTitle = document.getElementById('current-title');
    const matchList    = document.getElementById('match-list');
    const ctrlPlay     = document.getElementById('ctrl-play');
    const ctrlProgress = document.getElementById('ctrl-progress');
    const ctrlTime     = document.getElementById('ctrl-time');
    const ctrlFull     = document.getElementById('ctrl-fullscreen');
    const iconPlay     = document.getElementById('icon-play');
    const iconPause    = document.getElementById('icon-pause');

    // ── Helpers ────────────────────────────────────────────────
    function fmt(secs) {
      if (!secs || isNaN(secs)) return '0:00';
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function setPlayIcon(playing) {
      iconPlay.style.display  = playing ? 'none' : '';
      iconPause.style.display = playing ? '' : 'none';
      videoWrap.classList.toggle('is-playing', playing);
    }

    // ── Play / pause ───────────────────────────────────────────
    function togglePlay() {
      if (!video.src) return;
      video.paused ? video.play() : video.pause();
    }

    video.addEventListener('play',  () => setPlayIcon(true));
    video.addEventListener('pause', () => setPlayIcon(false));
    video.addEventListener('ended', () => setPlayIcon(false));

    // Click on the video area (not controls) also toggles play
    video.addEventListener('click', togglePlay);
    ctrlPlay.addEventListener('click', togglePlay);

    // ── Progress bar ───────────────────────────────────────────
    video.addEventListener('timeupdate', () => {
      if (!video.duration) return;
      ctrlProgress.value = (video.currentTime / video.duration) * 100;
      ctrlTime.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
    });

    video.addEventListener('loadedmetadata', () => {
      ctrlTime.textContent = `0:00 / ${fmt(video.duration)}`;
    });

    let isScrubbing = false;
    ctrlProgress.addEventListener('mousedown', () => { isScrubbing = true; });
    ctrlProgress.addEventListener('input', () => {
      video.currentTime = (ctrlProgress.value / 100) * (video.duration || 0);
    });
    ctrlProgress.addEventListener('mouseup', () => { isScrubbing = false; });

    // ── Fullscreen ─────────────────────────────────────────────
    ctrlFull.addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        videoWrap.requestFullscreen();
      }
    });

    // ── Keyboard shortcuts (single source of truth) ────────────
    // Using capture phase so this fires before any element's own handler,
    // and we stop propagation — no native video keyboard handling can interfere.
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (!video.src) return;

      if (e.key === ' ') {
        e.preventDefault();
        e.stopPropagation();
        togglePlay();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        e.stopPropagation();
        video.currentTime = Math.max(0, video.currentTime - 5);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        e.stopPropagation();
        video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 5);
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        e.stopPropagation();
        document.fullscreenElement ? document.exitFullscreen() : videoWrap.requestFullscreen();
      }
    }, { capture: true });

    // ── Load a match into the player ──────────────────────────
    function loadMatch(url, title) {
      if (!url) return;

      video.src = url;
      video.style.display = 'block';
      videoEmpty.style.display = 'none';
      document.getElementById('video-controls').style.display = 'flex';

      currentTitle.textContent = title || 'Untitled match';
      currentTitle.classList.remove('empty');

      setPlayIcon(false);
      ctrlProgress.value = 0;
      ctrlTime.textContent = '0:00 / 0:00';
      video.load();
    }

    // ── Match item click delegation ────────────────────────────
    matchList.addEventListener('click', (e) => {
      if (e.target.closest('.match-item-delete')) return;

      const item = e.target.closest('.match-item');
      if (!item) return;

      document.querySelectorAll('.match-item').forEach(el => el.classList.remove('is-active'));
      item.classList.add('is-active');

      const url   = item.dataset.url;
      const desc  = item.querySelector('.match-item-desc');
      const title = desc ? desc.value || desc.placeholder : item.dataset.title;
      loadMatch(url, title);
    });
  </script>

</body>
</html>
